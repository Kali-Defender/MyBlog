<!DOCTYPE html>
<html lang="zh-CN" class="art-html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肖申克的救赎 · 电影详情</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .film-detail {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      align-items: flex-start;
    }
    .film-poster {
      flex: 0 0 260px;
      background: #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      text-align: center;
    }
    .film-poster img {
      width: 100%;
      height: auto;
      display: block;
    }
    .film-info {
      flex: 1;
      min-width: 280px;
    }
    .film-info h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }
    .film-year {
      color: #aaa;
      font-size: 15px;
      margin-bottom: 20px;
    }
    .film-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #ccc;
    }
    .film-meta span {
      background: #333;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .film-desc {
      line-height: 1.9;
      margin-bottom: 20px;
    }
    .film-rating {
      color: #d4a373;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .btn-review {
      display: inline-block;
      padding: 10px 22px;
      background: #d4a373;
      color: #0a0a0a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }
    .btn-review:hover {
      background: #e6b480;
    }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #d4a373;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: 0.2s;
    }
    .back-link:hover {
      border-bottom-color: #d4a373;
    }
  </style>
</head>
<body class="art-body">
  <div class="art-container">
    <div class="film-detail">
      <div class="film-poster">
        <!-- 本地海报图片，确保 p1.png 与本文件在同一目录下 -->
        <img src="film1/p1.png" alt="肖申克的救赎海报">
      </div>
      <div class="film-info">
        <h1>肖申克的救赎</h1>
        <p class="film-year">1994</p>
        <div class="film-meta">
          <span>导演：弗兰克·德拉邦特</span>
          <span>类型：剧情 / 犯罪</span>
          <span>片长：142 分钟</span>
        </div>
        <p class="film-desc">
          银行家安迪被误判杀害妻子及其情人，关进肖申克监狱。在狱中，他凭借才智和毅力，赢得了狱友的尊重，并暗中策划了一场惊天越狱。二十年的坚持，最终换来自由的曙光。
        </p>
        <p class="film-rating">⭐ 9.7 / 10</p>
        <a href="review-list.html?film=1" class="btn-review">📝 查看影评</a>
        <br>
        <a href="../index.html" class="back-link">← 返回艺术馆</a>
      </div>
    </div>
  </div>
  <a href="../index.html" class="art-door" title="返回艺术馆">🚪</a>
</body>
</html>
